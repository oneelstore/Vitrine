<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; text-align: center; padding: 40px 20px; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
        h1 { font-size: 20px; margin: 15px 0; color: #333; }
        .links-container { max-width: 400px; margin: 0 auto; }
        .link-card { display: block; background: white; color: #333; text-decoration: none; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; transition: 0.2s; }
        .link-card:hover { transform: scale(1.02); background: #0076ff; color: white; }
    </style>
</head>
<body>

    <!-- Sua Imagem de Perfil -->
    <img src="https://placeholder.com" alt="Foto de Perfil" class="profile-img">
    <h1>@SeuUsuario</h1>

    <!-- Seus Links -->
    <div class="links-container">
        <a href="https://instagram.com" target="_blank" class="link-card">Instagram</a>
        <a href="https://wa.me" target="_blank" class="link-card">WhatsApp</a>
        <a href="https://linkedin.com" target="_blank" class="link-card">LinkedIn</a>
    </div>

</body>
</html>
